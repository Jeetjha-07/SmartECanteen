version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: smartcanteen-mongodb-prod
    environment:
      MONGO_INITDB_DATABASE: smartcanteen
    restart: unless-stopped
    volumes:
      - mongodb_data_prod:/data/db
    networks:
      - smartcanteen-network-prod
    # For production, uncomment and set authentication:
    # environment:
    #   MONGO_INITDB_ROOT_USERNAME: <username>
    #   MONGO_INITDB_ROOT_PASSWORD: <password>

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartcanteen-backend-prod
    restart: unless-stopped
    environment:
      MONGODB_URI: mongodb://mongodb:27017/smartcanteen
      JWT_SECRET: ${JWT_SECRET}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      PORT: 3000
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - mongodb
    networks:
      - smartcanteen-network-prod
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  mongodb_data_prod:

networks:
  smartcanteen-network-prod:
    driver: bridge
