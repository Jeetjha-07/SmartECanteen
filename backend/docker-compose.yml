version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: smartcanteen-mongodb
    environment:
      MONGO_INITDB_DATABASE: smartcanteen
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - smartcanteen-network

  backend:
    build: .
    container_name: smartcanteen-backend
    environment:
      MONGODB_URI: mongodb://mongodb:27017/smartcanteen
      PORT: 3000
      NODE_ENV: development
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
    ports:
      - "3000:3000"
    depends_on:
      - mongodb
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - smartcanteen-network
    command: npm run dev

volumes:
  mongodb_data:

networks:
  smartcanteen-network:
    driver: bridge
