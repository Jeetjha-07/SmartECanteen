services:
  - type: web
    name: smartcanteen-backend
    env: docker
    plan: free
    
    # Docker configuration (Build from root Dockerfile)
    dockerfilePath: ./Dockerfile
    
    # Port configuration
    port: 3000
    numInstances: 1
    
    # Environment variables (Set these in Render dashboard)
    envVars:
      - key: NODE_ENV
        value: production
    
    # Health check
    healthCheckPath: /health
    
    # Scaling (for free tier, autoscaling is limited)
    autoDeploy: true
